<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybeck House - Exclusive Corporate Event Venue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f7;
            color: #2c2c2c;
            line-height: 1.6;
        }

        /* Header */
        header {
            text-align: center;
            padding: 80px 20px 60px;
            background: linear-gradient(to bottom, #faf9f7 0%, #f5f4f2 100%);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #666;
        }

        /* Contact */
        .contact {
            margin-top: 40px;
            font-size: 0.95rem;
            color: #555;
        }

        .contact a {
            color: #8b7355;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .contact a:hover {
            border-bottom-color: #8b7355;
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            cursor: pointer;
            background: #e8e6e3;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.5;
            padding: 20px;
            transition: opacity 0.3s;
        }

        .lightbox-nav:hover {
            opacity: 1;
        }

        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .gallery { grid-template-columns: 1fr; padding: 20px; }
            .gallery-item { aspect-ratio: 3 / 2; }
        }
    </style>
</head>
<body>
    <header>
        <h1>MAYBECK HOUSE</h1>
        <p class="tagline">Exclusive Corporate Event Venue</p>
        <div class="contact">
            <a href="mailto:info@maybeckhouse.com">info@maybeckhouse.com</a>
        </div>
    </header>

    <main class="gallery">
        <div class="gallery-item"><img src="images/maybeck_event_venue_exterior_front_door.jpg" alt="Exterior Front Door"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_exterior_diagonal.jpg" alt="Exterior Diagonal View"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_exterior_back.jpg" alt="Exterior Back View"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_livingroom_fireplace.jpg" alt="Living Room with Fireplace"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_livingroom_piano.jpg" alt="Living Room with Piano"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_library.jpg" alt="Library"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_library_mayan.jpg" alt="Library Detail"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_slidingdoors.jpg" alt="Sliding Doors"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_kitchen_window.jpg" alt="Kitchen Window"></div>
        <div class="gallery-item"><img src="images/maybeckhouse_kitchen_sideview.jpg" alt="Kitchen Side View"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_dining_room.jpg" alt="Dining Room"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_kitchen1.jpg" alt="Kitchen"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_foyer_stairs.jpg" alt="Foyer Stairs"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_exhibition_room1.jpg" alt="Exhibition Room"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_exhibition_room2.jpg" alt="Exhibition Room 2"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_exhibition_room4.jpg" alt="Exhibition Room 4"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_art_room.jpg" alt="Art Room"></div>
        <div class="gallery-item"><img src="images/maybeck_event_venue_exterior1.jpg" alt="Exterior View"></div>
        <div class="gallery-item"><img src="images/gallery-2.jpg" alt="Gallery"></div>
        <div class="gallery-item"><img src="images/about.jpg" alt="About"></div>
        <div class="gallery-item"><img src="images/neighborhood.jpg" alt="Neighborhood"></div>
        <div class="gallery-item"><img src="images/events.jpg" alt="Events"></div>
        <div class="gallery-item"><img src="images/press.jpg" alt="Press"></div>
        <div class="gallery-item"><img src="images/amenities-2.jpg" alt="Amenities"></div>
        <div class="gallery-item"><img src="images/image-asset.jpeg" alt="Image Asset"></div>
    </main>

    <footer>
        <p>&copy; 2025 Maybeck House. All rights reserved.</p>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="prevImage()">&#8249;</span>
        <img src="" alt="" id="lightbox-img">
        <span class="lightbox-nav lightbox-next" onclick="nextImage()">&#8250;</span>
    </div>

    <script>
        const galleryItems = document.querySelectorAll('.gallery-item img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let currentIndex = 0;

        galleryItems.forEach((img, index) => {
            img.parentElement.addEventListener('click', () => openLightbox(index));
        });

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = galleryItems[index].src;
            lightboxImg.alt = galleryItems[index].alt;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % galleryItems.length;
            lightboxImg.src = galleryItems[currentIndex].src;
            lightboxImg.alt = galleryItems[currentIndex].alt;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
            lightboxImg.src = galleryItems[currentIndex].src;
            lightboxImg.alt = galleryItems[currentIndex].alt;
        }

        // Close on click outside image
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target.classList.contains('lightbox-close')) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });
    </script>
</body>
</html>
